<style>

<script>
const canvas = document.getElementById('climberCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('game-container');

let CW = canvas.width = window.innerWidth;
let CH = canvas.height = window.innerHeight;

// Normal physics parameters
const GRAVITY = 0.35;
const BASE_JUMP = -8.9;
const ITEM_BOUNCE = -6.2;

let currentLevel = 1;
let score = 0;
let bestScore = parseInt(localStorage.getItem('istgkan_best_score')) || 0;
let cameraY = 0;
let gameOver = false;
let isLevelTransition = false;
let gameStarted = false;
let playerName = '';

let player, platforms, items;

let currentLevelCounts = { bean: 0, cardamom: 0, milk: 0, ice: 0, avocado: 0 };
const levelTargets = {
1: { bean: 12, cardamom: 6 },
2: { bean: 8, milk: 4, ice: 4 },
3: { bean: 6, milk: 3, avocado: 3 }
};

let moveLeft = false;
let moveRight = false;
let screenShake = 0;

// Delta-time tracking variables to normalize physics across all frame rates (30FPS / 60FPS / 120FPS)
let lastTime = performance.now();

// ==========================================
// PARTICLE SYSTEM
// ==========================================
class Particle {
  constructor(x, y, color, size, vx, vy, life) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.size = size;
    this.vx = vx;
    this.vy = vy;
    this.life = life;
    this.maxLife = life;
  }

  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vx *= Math.pow(0.98, dt);
    this.vy *= Math.pow(0.98, dt);
    this.life -= dt;
  }

  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

class ParticleSystem {
  constructor() {
    this.particles = [];
  }

  addTrail(x, y, color) {
    if (Math.random() < 0.4) {
      const size = 1.5 + Math.random() * 2.5;
      const vx = (Math.random() - 0.5) * 0.4;
      const vy = (Math.random() * 0.4) + 0.3;
      const life = 20 + Math.random() * 15;
      this.particles.push(new Particle(x, y, color, size, vx, vy, life));
    }
  }

  addExplosion(x, y, color, count = 12) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.2 + Math.random() * 2.8;
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      const size = 2.5 + Math.random() * 3.5;
      const life = 25 + Math.random() * 20;
      this.particles.push(new Particle(x, y, color, size, vx, vy, life));
    }
  }

  update(dt) {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      this.particles[i].update(dt);
      if (this.particles[i].life <= 0) {
        this.particles.splice(i, 1);
      }
    }
  }

  draw() {
    this.particles.forEach(p => p.draw());
  }
}

const particleSystem = new ParticleSystem();

// ==========================================
// AUDIO SYNTHESIZER (WEB AUDIO API)
// ==========================================
class AudioSynthesizer {
  constructor() {
    this.ctx = null;
    this.muted = localStorage.getItem('istgkan_muted') === 'true';
  }

  init() {
    if (this.ctx) return;
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (AudioContextClass) {
      this.ctx = new AudioContextClass();
    }
  }

  toggleMute() {
    this.muted = !this.muted;
    localStorage.setItem('istgkan_muted', this.muted);
    return this.muted;
  }

  playJump() {
    if (this.muted) return;
    this.init();
    if (!this.ctx) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();

    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();

    osc.type = 'triangle';
    osc.frequency.setValueAtTime(140, now);
    osc.frequency.exponentialRampToValueAtTime(320, now + 0.15);

    gain.gain.setValueAtTime(0.12, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);

    osc.connect(gain);
    gain.connect(this.ctx.destination);

    osc.start(now);
    osc.stop(now + 0.15);
  }

  playCollect() {
    if (this.muted) return;
    this.init();
    if (!this.ctx) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();

    const now = this.ctx.currentTime;
    const osc1 = this.ctx.createOscillator();
    const osc2 = this.ctx.createOscillator();
    const gain = this.ctx.createGain();

    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(523.25, now);
    osc1.frequency.exponentialRampToValueAtTime(880, now + 0.18);

    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(659.25, now);
    osc2.frequency.exponentialRampToValueAtTime(1046.5, now + 0.18);

    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.22);

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(this.ctx.destination);

    osc1.start(now);
    osc2.start(now);
    osc1.stop(now + 0.22);
    osc2.stop(now + 0.22);
  }

  playLevelClear() {
    if (this.muted) return;
    this.init();
    if (!this.ctx) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();

    const now = this.ctx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.50];
    const noteDuration = 0.12;

    notes.forEach((freq, index) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      const startTime = now + index * noteDuration;

      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, startTime);
      
      gain.gain.setValueAtTime(0.12, startTime);
      gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.28);

      osc.connect(gain);
      gain.connect(this.ctx.destination);

      osc.start(startTime);
      osc.stop(startTime + 0.28);
    });
  }

  playGameOver() {
    if (this.muted) return;
    this.init();
    if (!this.ctx) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();

    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();

    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(240, now);
    osc.frequency.linearRampToValueAtTime(60, now + 0.5);

    gain.gain.setValueAtTime(0.15, now);
    gain.gain.linearRampToValueAtTime(0.01, now + 0.5);

    osc.connect(gain);
    gain.connect(this.ctx.destination);

    osc.start(now);
    osc.stop(now + 0.5);
  }
}

const sounds = new AudioSynthesizer();

// ==========================================
// GAME ENTITIES
// ==========================================
class PlayerBall {
  constructor() {
    this.x = CW / 2;
    this.y = CH - 160;
    this.radius = 11;
    this.vx = 0;
    this.vy = 0;
    // Normal horizontal speed limit
    this.speed = window.innerWidth < 768 ? 4 : 4.8;
    this.stretchX = 1;
    this.stretchY = 1;
  }

  update(dt) {
    this.vy += GRAVITY * dt;

    // Normal acceleration and friction based on delta-time
    const accel = (window.innerWidth < 768 ? 0.30 : 0.40) * dt;
    const friction = Math.pow(window.innerWidth < 768 ? 0.84 : 0.82, dt);

    if(moveLeft){
      this.vx -= accel;
    }
    else if(moveRight){
      this.vx += accel;
    }
    else{
      this.vx *= friction;
    }

    this.vx = Math.max(-this.speed, Math.min(this.speed, this.vx));

    this.x += this.vx * dt;
    this.y += this.vy * dt;

    if (this.x < -this.radius) this.x = CW + this.radius;
    if (this.x > CW + this.radius) this.x = -this.radius;

    // Squash & stretch factors
    let targetStretchY = 1 + Math.min(0.25, Math.abs(this.vy) * 0.025);
    let targetStretchX = 1 / targetStretchY;

    this.stretchX += (targetStretchX - this.stretchX) * 0.15 * dt;
    this.stretchY += (targetStretchY - this.stretchY) * 0.15 * dt;

    // Particle Trail
    if (gameStarted && !gameOver && !isLevelTransition) {
      particleSystem.addTrail(this.x, this.y, 'rgba(201, 165, 106, 0.4)');
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.scale(this.stretchX, this.stretchY);
    this.drawBall();
    ctx.restore();

    // Draw wrap-around clones near canvas borders
    if (this.x < this.radius * 2) {
      ctx.save();
      ctx.translate(this.x + CW, this.y);
      ctx.scale(this.stretchX, this.stretchY);
      this.drawBall();
      ctx.restore();
    } else if (this.x > CW - this.radius * 2) {
      ctx.save();
      ctx.translate(this.x - CW, this.y);
      ctx.scale(this.stretchX, this.stretchY);
      this.drawBall();
      ctx.restore();
    }
  }

  drawBall() {
    // Vector shadow overlay instead of slow Gaussian shadowBlur
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, 0, this.radius + 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(201, 165, 106, 0.18)';
    ctx.fill();
    ctx.restore();

    ctx.beginPath();
    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);

    let radGrad = ctx.createRadialGradient(-3, -3, 1, 0, 0, this.radius);
    radGrad.addColorStop(0, '#FFFFFF');
    radGrad.addColorStop(0.5, '#A5844F');
    radGrad.addColorStop(1, '#1A1C1A');

    ctx.fillStyle = radGrad;
    ctx.fill();
  }
}

class ElegantPlatform {
  constructor(y, width, prevX) {
    const margin = CW * 0.08;
    this.width = width;
    this.height = 8;

    if (prevX === undefined) {
      this.x = margin + Math.random() * (CW - width - margin * 2);
    } else {
      // Force a minimum horizontal offset based on platform width to create a natural zig-zag climbing flow
      const minOffset = Math.max(35, width * 0.45);
      const maxOffset = minOffset + 90;
      
      let dir = Math.random() > 0.5 ? 1 : -1;
      
      const minBound = margin;
      const maxBound = CW - width - margin;
      
      // Force direction if too close to screen boundaries
      if (prevX - minOffset < minBound) {
        dir = 1;
      } else if (prevX + minOffset > maxBound) {
        dir = -1;
      }
      
      let offset = minOffset + Math.random() * (maxOffset - minOffset);
      let targetX = prevX + dir * offset;
      
      this.x = Math.max(minBound, Math.min(maxBound, targetX));
    }

    this.y = y;
    this.vx = (currentLevel >= 2) ? (Math.random() > 0.5 ? 1 : -1) * (0.3 + currentLevel * 0.2) : 0;
  }

  update(dt) {
    this.x += this.vx * dt;
    if (this.x < 0 || this.x + this.width > CW) {
      this.vx *= -1;
    }
  }

  draw() {
    ctx.save();
    ctx.fillStyle = '#08140E';
    ctx.beginPath();
    ctx.roundRect(this.x, this.y, this.width, this.height, 3);
    ctx.fill();
    ctx.strokeStyle = 'rgba(165, 132, 79, 0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }
}

class RecipeIngredient {
  constructor(platform, type) {
    this.platform = platform;
    this.offsetX = platform.width / 2;
    this.x = platform.x + this.offsetX;
    this.y = platform.y - 18;
    this.type = type;
    this.radius = 9;
    this.consumed = false;
    this.bobOffset = Math.random() * Math.PI * 2;
  }

  update(dt) {
    this.x = this.platform.x + this.offsetX;
    this.y = this.platform.y - 18 + Math.sin(Date.now() * 0.005 + this.bobOffset) * 4;
  }

  draw() {
    if (this.consumed) return;
    ctx.save();
    ctx.translate(this.x, this.y);

    // Vector glow overlay instead of canvas shadowBlur
    ctx.beginPath();
    ctx.arc(0, 0, this.radius + 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
    ctx.fill();

    switch(this.type) {
      case 'bean':
        ctx.beginPath();
        ctx.ellipse(0, 0, 10, 6, Math.PI/4, 0, Math.PI*2);
        ctx.fillStyle = '#4A2E1B';
        ctx.fill();
        ctx.strokeStyle = '#2B1A10';
        ctx.stroke();
        break;

      case 'cardamom':
        ctx.beginPath();
        ctx.ellipse(0, 0, 9, 5.5, 0, 0, Math.PI*2);
        ctx.fillStyle = '#6E7F42';
        ctx.fill();
        break;

      case 'milk':
        ctx.fillStyle = '#EAEAEA';
        ctx.fillRect(-6, -8, 12, 16);
        ctx.fillStyle = '#A5844F';
        ctx.fillRect(-6, -2, 12, 3);
        break;

      case 'ice':
        ctx.fillStyle = 'rgba(165,214,167,.7)';
        ctx.strokeStyle = '#E0F2F1';
        ctx.lineWidth = 1;
        ctx.fillRect(-7,-7,14,14);
        ctx.strokeRect(-7,-7,14,14);
        break;

      case 'avocado':
        ctx.beginPath();
        ctx.ellipse(0,0,11,7,Math.PI/2,0,Math.PI*2);
        ctx.fillStyle='#4B7302';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(0,1,3,0,Math.PI*2);
        ctx.fillStyle='#8B4513';
        ctx.fill();
        break;
    }
    ctx.restore();
  }
}

function initLevelState(level) {
  currentLevel = level;
  player = new PlayerBall();
  platforms = [];
  items = [];
  cameraY = 0;
  score = 0;
  document.getElementById('score').innerText = '0';
  document.getElementById('best-score').innerText = bestScore;

  currentLevelCounts = { bean:0, cardamom:0, milk:0, ice:0, avocado:0 };

  if(level===1) document.getElementById('level-title').innerText='المستوى ١: القهوة السعودية';
  if(level===2) document.getElementById('level-title').innerText='المستوى ٢: آيس لاتيه';
  if(level===3) document.getElementById('level-title').innerText='المستوى ٣: أفوكادو سبيشال';

  updateRecipeBar();

  // Create starting platform
  let base = new ElegantPlatform(CH - 60, CW);
  base.x = 0;
  base.vx = 0;
  platforms.push(base);

  let itemsToSpawn = [];
  if(level===1) itemsToSpawn=['bean','cardamom'];
  if(level===2) itemsToSpawn=['bean','milk','ice'];
  if(level===3) itemsToSpawn=['bean','milk','avocado'];

  let baseWidth = CW * 0.22;
  let arrayIndex = 0;

  for(let y = CH - 140; y > -CH * 30; y -= 68 + Math.random() * 16){
    let currentWidth = Math.max(CW * 0.15, baseWidth - (Math.abs(cameraY) / 100));
    
    // Constrain position relative to previous platform to prevent unreachable generation
    let lastPlatform = platforms[platforms.length - 1];
    let prevX = (lastPlatform && lastPlatform.width < CW) ? lastPlatform.x : (CW / 2 - currentWidth / 2);
    
    let p = new ElegantPlatform(y, currentWidth, prevX);
    platforms.push(p);

    if(Math.random() < 0.48 && arrayIndex < 60){
      let orderedType = itemsToSpawn[arrayIndex % itemsToSpawn.length];
      items.push(new RecipeIngredient(p, orderedType));
      arrayIndex++;
    }
    else if(Math.random() < 0.12){
      items.push(new RecipeIngredient(p,'bean'));
    }
  }
}

function updateRecipeBar() {
  let bar = document.getElementById('recipe-progress');
  let targets = levelTargets[currentLevel];
  let html = '<div class="recipe-badges-container">';

  const itemIcons = {
    bean: '🫘',
    cardamom: '🌿',
    milk: '🥛',
    ice: '🧊',
    avocado: '🥑'
  };

  const itemNames = {
    bean: 'البن',
    cardamom: 'الهيل',
    milk: 'الحليب',
    ice: 'الثلج',
    avocado: 'الأفوكادو'
  };

  for (let key in targets) {
    let current = currentLevelCounts[key];
    let target = targets[key];
    let pct = Math.min(100, (current / target) * 100);
    let isDone = current >= target;

    html += `
      <div class="recipe-badge ${isDone ? 'completed' : ''}">
        <div class="recipe-badge-fill" style="width: ${pct}%"></div>
        <span class="badge-icon">${itemIcons[key]}</span>
        <span class="badge-label">${itemNames[key]}: ${current}/${target}</span>
        ${isDone ? '<span class="badge-check">✓</span>' : ''}
      </div>
    `;
  }
  html += '</div>';
  bar.innerHTML = html;
}

function processInput(clientX, target) {
  if (target && (target.id === 'mute-btn' || target.closest('button') || target.closest('input') || target.closest('#leaderboard-panel'))) {
    return;
  }
  if (clientX < window.innerWidth / 2) {
    moveLeft = true;
    moveRight = false;
    document.getElementById('touch-left').classList.add('active');
    document.getElementById('touch-right').classList.remove('active');
  } else {
    moveRight = true;
    moveLeft = false;
    document.getElementById('touch-right').classList.add('active');
    document.getElementById('touch-left').classList.remove('active');
  }
}

function clearInput() {
  moveLeft = false;
  moveRight = false;
  document.getElementById('touch-left').classList.remove('active');
  document.getElementById('touch-right').classList.remove('active');
}

window.addEventListener('touchstart', (e) => {
  if(gameOver || isLevelTransition) return;
  processInput(e.touches[0].clientX, e.target);
}, {passive:true});

window.addEventListener('touchmove', (e) => {
  if(gameOver || isLevelTransition) return;
  processInput(e.touches[0].clientX, e.target);
}, {passive:true});

window.addEventListener('touchend', clearInput);

window.addEventListener('mousedown', (e) => {
  if(gameOver || isLevelTransition) return;
  processInput(e.clientX, e.target);
});

window.addEventListener('mousemove', (e) => {
  if(e.buttons === 1 && !gameOver && !isLevelTransition)
    processInput(e.clientX, e.target);
});

function checkGameRules(dt) {
  platforms.forEach(p => {
    if (Math.abs(player.y - p.y) < 50) {
      if(player.vy > 0 && player.x >= p.x && player.x <= p.x + p.width && player.y + player.radius >= p.y && player.y - player.radius <= p.y + p.height){
        player.vy = BASE_JUMP;
        player.stretchX = 1.35;
        player.stretchY = 0.65;
        screenShake = 3;
        sounds.playJump();
      }
    }
  });

  items.forEach(item => {
    if (!item.consumed && Math.abs(player.y - item.y) < 50) {
      if(Math.hypot(player.x - item.x, player.y - item.y) < player.radius + item.radius){
        item.consumed = true;
        player.vy = ITEM_BOUNCE;
        player.stretchX = 0.8;
        player.stretchY = 1.3;
        screenShake = 6;
        sounds.playCollect();

        let pColor = '#FFF';
        if (item.type === 'bean') pColor = '#8B5A2B';
        else if (item.type === 'cardamom') pColor = '#6E7F42';
        else if (item.type === 'milk') pColor = '#EAEAEA';
        else if (item.type === 'ice') pColor = '#80DEEA';
        else if (item.type === 'avocado') pColor = '#4B7302';
        
        particleSystem.addExplosion(item.x, item.y, pColor, 16);

        if(currentLevelCounts[item.type] !== undefined){
          currentLevelCounts[item.type]++;
        }

        updateRecipeBar();
        checkLevelCompletion();
      }
    }
  });

  if(player.y > CH + 30 && !isLevelTransition){
    endGame();
  }
}

function checkLevelCompletion(){
  let targets = levelTargets[currentLevel];
  let isComplete = true;

  for(let key in targets){
    if(currentLevelCounts[key] < targets[key])
      isComplete = false;
  }

  if(isComplete)
    triggerLevelClear();
}

    }
  },800);
}

function handleOverlayAction(){
  const btnText = document.getElementById('screen-btn').innerText;

  if(btnText==='ابدأ المستوى ٢'){

function updateCamera(dt) {
  if (player.y < CH / 2) {
    let diff = CH / 2 - player.y;
    player.y = CH / 2;
    cameraY += diff;
    platforms.forEach(p => p.y += diff);
    items.forEach(d => d.y += diff);

    let calcHeight = Math.floor(cameraY / 10);
    if (calcHeight > score) {
      score = calcHeight;
      document.getElementById('score').innerText = score;
      if (score > bestScore) {
        bestScore = score;
        document.getElementById('best-score').innerText = bestScore;
        localStorage.setItem('istgkan_best_score', bestScore);
      }
    }
  }
}

function drawLogoWatermark() {
  ctx.save();
  ctx.translate(CW / 2, CH / 2);
  ctx.strokeStyle = 'rgba(165, 132, 79, 0.04)';
  ctx.lineWidth = 1;

  for (let i = -5; i <= 5; i++) {
    let yOffset = (i * 150 + (cameraY * 0.4)) % (CH * 1.5) - (CH * 0.75);

    ctx.beginPath();
    ctx.moveTo(-60, yOffset - 20);
    ctx.lineTo(-85, yOffset);
    ctx.lineTo(-60, yOffset + 20);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(-25, yOffset);
    ctx.lineTo(0, yOffset - 25);
    ctx.lineTo(25, yOffset);
    ctx.lineTo(0, yOffset + 25);
    ctx.closePath();
    ctx.stroke();

    ctx.fillStyle = 'rgba(165, 132, 79, 0.05)';
    ctx.fillRect(-6, yOffset - 3, 4, 4);
    ctx.fillRect(2, yOffset - 3, 4, 4);

    ctx.beginPath();
    ctx.moveTo(60, yOffset - 20);
    ctx.lineTo(75, yOffset);
    ctx.lineTo(60, yOffset + 20);
    ctx.stroke();
  }
  ctx.restore();
}

function gameLoop(time) {
  if (!time) time = performance.now();
  let dt = (time - lastTime) / 16.666;
  if (dt > 4) dt = 4;
  lastTime = time;

  ctx.clearRect(0,0,CW,CH);

  // Apply Screen Shake
  ctx.save();
  if (screenShake > 0.1) {
    let dx = (Math.random() - 0.5) * screenShake;
    let dy = (Math.random() - 0.5) * screenShake;
    ctx.translate(dx, dy);
    screenShake *= 0.85;
  }

  drawLogoWatermark();

  // Performance Culling: Only update & draw items/platforms in viewport proximity
  platforms.forEach(p => {
    if (p.y >= -150 && p.y <= CH + 150) {
      if(!gameOver && !isLevelTransition) p.update(dt);
      p.draw();
    }
  });

  items.forEach(d => {
    if (d.y >= -150 && d.y <= CH + 150) {
      if(!gameOver && !isLevelTransition) d.update(dt);
      d.draw();
    }
  });

  if(gameStarted){
    if(!gameOver && !isLevelTransition){
      player.update(dt);
      checkGameRules(dt);
      updateCamera(dt);
    }
    else if(isLevelTransition){
      player.y += player.vy * dt;
    }
  }

  player.draw();

  particleSystem.update(dt);
  particleSystem.draw();

  ctx.restore();
  requestAnimationFrame(gameLoop);
}
